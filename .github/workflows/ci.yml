name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ============================================
  # Backend CI - Lint and Test
  # ============================================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run linting
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

      - name: Run tests
        run: npm run test:ci

  # ============================================
  # Frontend CI - Lint and Build
  # ============================================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run linting
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

      - name: Run type checking
        run: npm run typecheck

      - name: Build application
        run: npm run build

  # ============================================
  # Playwright E2E Tests
  # ============================================
  playwright-tests:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci] # Run after both backend and frontend build successfully
    
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./playwright

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./playwright/package-lock.json"

      - name: Install Playwright dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci || npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Start backend server
        working-directory: ./backend
        run: |
          npm start &
          echo $! > backend.pid
        env:
          NODE_ENV: test
          PORT: 3001
          MONGODB_URI: mongodb://localhost:27017/baby-bliss-test
          JWT_SECRET: test-jwt-secret-key
          JWT_EXPIRES_IN: 7d
          FRONTEND_URL: http://localhost:3000

      - name: Start frontend server
        working-directory: ./frontend
        run: |
          npm start &
          echo $! > frontend.pid
        env:
          PORT: 3000

      - name: Wait for servers to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000 && curl -f http://localhost:3001/health; do sleep 2; done' || echo "Servers may not be fully ready"

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          CI: true

      - name: Stop servers
        if: always()
        run: |
          if [ -f ./backend/backend.pid ]; then
            kill $(cat ./backend/backend.pid) || true
          fi
          if [ -f ./frontend/frontend.pid ]; then
            kill $(cat ./frontend/frontend.pid) || true
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: playwright/test-results/
          retention-days: 7

  # ============================================
  # CI Status Check
  # ============================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, playwright-tests]
    if: always()

    steps:
      - name: Check CI status
        run: |
          if [[ "${{ needs.backend-ci.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-ci.result }}" == "failure" ]] || \
             [[ "${{ needs.playwright-tests.result }}" == "failure" ]]; then
            echo "❌ CI failed"
            exit 1
          else
            echo "✅ All CI checks passed"
          fi
